<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<style>
  .swiper {
    display: flex;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    /* padding: 20px 0; */
  }

  .swiper-slide {
    width: 200px;
    /* height: 200px; Square box for logos */
  }

  .swiper-slide img {
    width: 200px;
    border-radius: 10px;
    /* height: 100%; */
    /* object-fit: contain; Logos ko bina crop kiye fit karega */
    /* display: block; */
  }
</style>

<!-- Swiper HTML -->
<div class="swiper mySwiper">
  <div class="swiper-wrapper">
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2025/06/island-resturent.jpeg" alt="Award 1"></div>
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2025/05/travelawards-150x150.jpeg" alt="Award 2"></div>
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2025/04/253f0ad8-5370-4fa4-b425-3a51c31a1864-e1746021291706-150x150.jpeg" alt="Award 3"></div>
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2024/08/Screen-Shot-2019-01-11-at-11_21_46-PM_pn-1.png" alt="Award 4"></div>
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2024/09/Untitled-design-3-150x150.jpg" alt="Award 5"></div>
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2024/09/IMG-20240928-WA0011-150x150.jpg" alt="Award 6"></div>
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2024/09/IMG-20240928-WA0017-150x150.jpg" alt="Award 7"></div>
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2024/09/IMG-20240928-WA0005-150x150.jpg" alt="Award 8"></div>
    <div class="swiper-slide"><img src="https://www.pescadorescebu.com/wp-content/uploads/2026/03/b42f243e-e61a-424c-9790-c6a7f0b8b866-150x150.jpg" alt="Award 9"></div>
  </div>
</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  var swiper = new Swiper(".mySwiper", {
    loop: true,
    slidesPerView: '5',
    spaceBetween: 10, 
    autoplay: {
      delay: 8000,
      disableOnInteraction: false,
    },
    grabCursor: true,
  });
  
</script>
