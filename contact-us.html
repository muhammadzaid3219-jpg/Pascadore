/* Hamburger Styling */
.hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; }
.hamburger span { width: 35px; height: 5px; background: white; transition: all 0.3s ease; } /* Transition for animation */

/* Tablet and Mobile Media Query */
@media (max-width: 992px) {
    .hamburger { display: flex; gap: 5px;  z-index: 100;} /* Ensure it stays above other elements */
    
    .nav-links {
        display: none; 
        flex-direction: column;
        position: absolute;
        top: 25%; /* Adjust top padding based on header height */
        left: 0;
        max-width: 725px;
        width: 100%;
        background: black;
        text-align: left;
        transition: all 0.3s ease;
        padding-top: 30px;
        padding-bottom: 30px;
    }
    
    .nav-links.active {
        display: flex;
        height: 420px;
        justify-content: center;
        width: 100%;
        position: absolute;
        left: 0px;
        max-width: 800px;
    }
    .nav-links.active {
        display: flex;
        height: 420px;
        justify-content: center;
        padding-left: 35px;
    }
    
    /* Cross icon effect when hamburger is active */
    .hamburger.active .bar1 { transform: translateY(8px) rotate(45deg); }
    .hamburger.active .bar2 { opacity: 0; }
    .hamburger.active .bar3 { transform: translateY(-8px) rotate(-45deg); }
