<div id="myModal" class="modal">
  <span class="close" onclick="closePopup()">&times;</span>
  <div class="slider-container">
    <button onclick="changeSlide(-1)">&#10094;</button>
    <img id="modalImage" src="image1.jpg">
    <button onclick="changeSlide(1)">&#10095;</button>
  </div>

<script>
    const images = ["https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_b19676f73b20470f8e7eb34186d88799mv2.webp", "https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_ab93dfb7b6934e3980eb59cd026a5bbamv2.webp", "https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_d943d6a4a835415e81c1268d40b511efmv2.webp", "https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_0bed0efd0f35406aaa669893d3531cb7mv2.webp", "https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_dbbd0a47c5714d329a49b56a0eee6249mv2.webp", "https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_35ab06537c884cb4a9caf65f41f15218mv2.webp", "https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_d19deda89805426c9153e8099688694fmv2.webp", "https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_d2815cbfa36e4709ab28d9044298b6ecmv2.webp", "https://www.pescadorescebu.com/wp-content/uploads/2024/08/caf340_1c3840cebccf452ea7e710d4a018744cmv2_d_2048_1360_s_2.webp"];
let currentIndex = 0;

function openPopup() {
  document.getElementById("myModal").style.display = "block";
  updateImage();
}

function closePopup() {
  document.getElementById("myModal").style.display = "none";
}

function changeSlide(direction) {
  currentIndex = (currentIndex + direction + images.length) % images.length;
  updateImage();
}

function updateImage() {
  document.getElementById("modalImage").src = images[currentIndex];
}
</script>
